  <script>

      // === 公式编辑 ===
      { id: 'form-02', keys: 'F2', desc: '关闭单元格编辑状态后，将插入点移动到编辑栏内', subcategory: '公式编辑' },

      { id: 'form-05', keys: 'Shift+F3', desc: '在公式中，显示"插入函数"对话框', subcategory: '函数插入' },
